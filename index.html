<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>time:matters – High Performance Logistics</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<header>
    <nav class="navbar">
        <div class="logo">time:matters</div>
        <ul class="nav-links">
            <li><a href="#about" data-i18n="nav_about"></a></li>
            <li><a href="#services" data-i18n="nav_services"></a></li>
            <li><a href="#industries" data-i18n="nav_industries"></a></li>
            <li><a href="#sustainability" data-i18n="nav_sustainability"></a></li>
            <li><a href="#contact" data-i18n="nav_contact"></a></li>
        </ul>
        <select id="language-switcher" aria-label="Language selector">
            <option value="en">English</option>
            <option value="de">Deutsch</option>
            <option value="nl">Nederlands</option>
            <option value="zh">中文</option>
        </select>
        <button class="burger" aria-label="Toggle navigation">
            <span></span><span></span><span></span>
        </button>
    </nav>

    <section class="hero">
        <h1 data-i18n="hero_title"></h1>
        <p data-i18n="hero_subtitle"></p>
        <!-- Slide 1 - Cover -->
        <img src="images/slide1_cover_placeholder.jpg" data-i18n-alt="alt_hero_cover" alt="">
    </section>
</header>

<main>
    <section id="about" class="about">
        <h2 data-i18n="about_title"></h2>
        <ul class="facts">
            <li data-i18n="about_fact1"></li>
            <li data-i18n="about_fact2"></li>
            <li data-i18n="about_fact3"></li>
            <li data-i18n="about_fact4"></li>
        </ul>
    </section>

    <section id="services" class="services">
        <h2 data-i18n="services_title"></h2>
        <div class="service-grid">
            <article class="service-card">
                <!-- Slide: “Sameday Air – Same day transports worldwide.” -->
                <img src="images/slide_sameday_air_placeholder.jpg" data-i18n-alt="alt_sameday_air" alt="">
                <h3 data-i18n="service_sameday_air_title"></h3>
                <p data-i18n="service_sameday_air_desc"></p>
            </article>

            <article class="service-card">
                <!-- Slide: “Sameday Rail – sameday transports by train.” -->
                <img src="images/slide_sameday_rail_placeholder.jpg" data-i18n-alt="alt_sameday_rail" alt="">
                <h3 data-i18n="service_sameday_rail_title"></h3>
                <p data-i18n="service_sameday_rail_desc"></p>
            </article>

            <article class="service-card">
                <!-- Slide: “Sameday Road – Transport by road without size and weight limitations, at any time.” -->
                <img src="images/slide_sameday_road_placeholder.jpg" data-i18n-alt="alt_sameday_road" alt="">
                <h3 data-i18n="service_sameday_road_title"></h3>
                <p data-i18n="service_sameday_road_desc"></p>
            </article>

            <article class="service-card">
                <!-- Slide: “Next Flight Out – global service on all passenger and cargo aircrafts.” -->
                <img src="images/slide_nfo_placeholder.jpg" data-i18n-alt="alt_nfo" alt="">
                <h3 data-i18n="service_nfo_title"></h3>
                <p data-i18n="service_nfo_desc"></p>
            </article>

            <article class="service-card">
                <!-- Slide: “time:matters On Board Courier (OBC) personally accompanied transports.” -->
                <img src="images/slide_obc_placeholder.jpg" data-i18n-alt="alt_obc" alt="">
                <h3 data-i18n="service_obc_title"></h3>
                <p data-i18n="service_obc_desc"></p>
            </article>

            <article class="service-card">
                <!-- Slide: “Charter – Designated aircraft for your shipment.” -->
                <img src="images/slide_charter_placeholder.jpg" data-i18n-alt="alt_charter" alt="">
                <h3 data-i18n="service_charter_title"></h3>
                <p data-i18n="service_charter_desc"></p>
            </article>

            <article class="service-card">
                <!-- Slide: “Spare Parts & Service Logistics Innight service for the spare parts supply.” -->
                <img src="images/slide_spare_parts_placeholder.jpg" data-i18n-alt="alt_spare_parts" alt="">
                <h3 data-i18n="service_spare_parts_title"></h3>
                <p data-i18n="service_spare_parts_desc"></p>
            </article>
        </div>
    </section>

    <section id="industries" class="industries">
        <h2 data-i18n="industries_title"></h2>
        <ul class="industry-list">
            <li data-i18n="industries_item1"></li>
            <li data-i18n="industries_item2"></li>
            <li data-i18n="industries_item3"></li>
            <li data-i18n="industries_item4"></li>
            <li data-i18n="industries_item5"></li>
            <li data-i18n="industries_item6"></li>
        </ul>
        <!-- Slide: “Dedicated experts for your industry.” -->
        <img src="images/slide_industries_placeholder.jpg" data-i18n-alt="alt_industries" alt="">
    </section>

    <section id="sustainability" class="sustainability">
        <h2 data-i18n="sustainability_title"></h2>
        <p data-i18n="sustainability_desc"></p>
        <!-- Slide: “Sustainability in motion: Our contribution to more sustainability.” -->
        <img src="images/slide_sustainability_placeholder.jpg" data-i18n-alt="alt_sustainability" alt="">
    </section>

    <section id="contact" class="contact">
        <h2 data-i18n="contact_title"></h2>
        <p data-i18n="contact_desc"></p>
        <a href="https://www.time-matters.com" class="btn" data-i18n="contact_button"></a>
    </section>
</main>

<footer>
    <p data-i18n="footer_text"></p>
</footer>

<script src="script.js"></script>
</body>
</html>
